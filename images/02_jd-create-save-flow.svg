<svg viewBox="0 0 1500 1280" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">岗位 JD 生成与保存流程</title>
  <desc id="desc">展示从用户填写岗位需求，到前端调用生成 JD，再保存到远程 HR 服务并返回 JD ID 的完整流程。</desc>
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#e5e7eb" stroke-width="0.7"/>
    </pattern>
    <marker id="arrow-blue" markerWidth="11" markerHeight="8" refX="10" refY="4" orient="auto">
      <polygon points="0 0, 11 4, 0 8" fill="#2563eb"/>
    </marker>
    <marker id="arrow-green" markerWidth="11" markerHeight="8" refX="10" refY="4" orient="auto">
      <polygon points="0 0, 11 4, 0 8" fill="#059669"/>
    </marker>
    <marker id="arrow-gray" markerWidth="11" markerHeight="8" refX="10" refY="4" orient="auto">
      <polygon points="0 0, 11 4, 0 8" fill="#64748b"/>
    </marker>
    <marker id="arrow-orange" markerWidth="11" markerHeight="8" refX="10" refY="4" orient="auto">
      <polygon points="0 0, 11 4, 0 8" fill="#d97706"/>
    </marker>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&amp;display=swap');
      text {
        font-family: 'JetBrains Mono', 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif;
        fill: #0f172a;
      }
      .title { font-size: 26px; font-weight: 700; }
      .subtitle { font-size: 13px; fill: #475569; }
      .lane-title { font-size: 14px; font-weight: 700; }
      .lane-subtitle { font-size: 10px; fill: #64748b; }
      .box-title { font-size: 13px; font-weight: 700; }
      .box-sub { font-size: 10px; fill: #475569; }
      .box-path { font-size: 9px; fill: #64748b; }
      .arrow-label { font-size: 9px; font-weight: 600; fill: #334155; }
      .note-title { font-size: 12px; font-weight: 700; }
      .note-text { font-size: 10px; fill: #475569; }
      .small { font-size: 9px; fill: #64748b; }
      .num { font-size: 10px; font-weight: 700; fill: #ffffff; }
      .step-circle { fill: #2563eb; stroke: #ffffff; stroke-width: 2; }
      .flow { fill: none; stroke: #2563eb; stroke-width: 2.2; marker-end: url(#arrow-blue); }
      .save-flow { fill: none; stroke: #059669; stroke-width: 2.2; marker-end: url(#arrow-green); }
      .return-flow { fill: none; stroke: #64748b; stroke-width: 2; stroke-dasharray: 7 5; marker-end: url(#arrow-gray); }
      .branch-flow { fill: none; stroke: #d97706; stroke-width: 2; marker-end: url(#arrow-orange); }
    </style>
  </defs>

  <rect width="1500" height="1280" fill="#ffffff"/>
  <rect width="1500" height="1280" fill="url(#grid)" opacity="0.55"/>

  <text x="60" y="56" class="title">岗位 JD 生成与保存流程</text>
  <text x="60" y="82" class="subtitle">主线：前端生成 JD 内容 → 流式接收 → 组装 jdData → 调保存接口 → 远程 HR 服务持久化 → 返回 JD ID</text>

  <rect x="42" y="112" width="340" height="1068" rx="16" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/>
  <rect x="402" y="112" width="340" height="1068" rx="16" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
  <rect x="762" y="112" width="340" height="1068" rx="16" fill="#ecfdf5" stroke="#bbf7d0" stroke-width="1.5"/>
  <rect x="1122" y="112" width="336" height="1068" rx="16" fill="#fff7ed" stroke="#fed7aa" stroke-width="1.5"/>

  <text x="66" y="144" class="lane-title">用户 / 前端页面</text>
  <text x="66" y="163" class="lane-subtitle">frontend/src/views/recruitment/JDGenerator.vue</text>
  <text x="426" y="144" class="lane-title">前端 API 封装</text>
  <text x="426" y="163" class="lane-subtitle">frontend/src/api/*.js</text>
  <text x="786" y="144" class="lane-title">后端 API / Service</text>
  <text x="786" y="163" class="lane-subtitle">backend/app/api/v1/endpoints + services</text>
  <text x="1146" y="144" class="lane-title">外部服务</text>
  <text x="1146" y="163" class="lane-subtitle">Dify 工作流 / 远程 HR 服务</text>

  <!-- Step boxes -->
  <g id="s1">
    <rect x="82" y="210" width="260" height="78" rx="10" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5"/>
    <circle cx="106" cy="233" r="13" class="step-circle"/><text x="106" y="237" class="num" text-anchor="middle">1</text>
    <text x="212" y="236" class="box-title" text-anchor="middle">用户填写岗位需求</text>
    <text x="212" y="256" class="box-sub" text-anchor="middle">职位、部门、经验、任职要求等</text>
    <text x="212" y="274" class="box-path" text-anchor="middle">点击“生成 JD”</text>
  </g>

  <g id="s2">
    <rect x="82" y="342" width="260" height="88" rx="10" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5"/>
    <circle cx="106" cy="365" r="13" class="step-circle"/><text x="106" y="369" class="num" text-anchor="middle">2</text>
    <text x="212" y="368" class="box-title" text-anchor="middle">generateJD()</text>
    <text x="212" y="388" class="box-sub" text-anchor="middle">组装生成请求参数</text>
    <text x="212" y="407" class="box-path" text-anchor="middle">JDGenerator.vue:1017</text>
  </g>

  <g id="s3">
    <rect x="442" y="342" width="260" height="88" rx="10" fill="#ffffff" stroke="#60a5fa" stroke-width="1.5"/>
    <circle cx="466" cy="365" r="13" class="step-circle"/><text x="466" y="369" class="num" text-anchor="middle">3</text>
    <text x="572" y="368" class="box-title" text-anchor="middle">hrWorkflowsApi.generateJD()</text>
    <text x="572" y="388" class="box-sub" text-anchor="middle">POST /api/v1/hr-workflows/generate-jd</text>
    <text x="572" y="407" class="box-path" text-anchor="middle">frontend/src/api/hrWorkflows.js:11</text>
  </g>

  <g id="s4">
    <rect x="802" y="342" width="260" height="88" rx="10" fill="#ffffff" stroke="#22c55e" stroke-width="1.5"/>
    <circle cx="826" cy="365" r="13" class="step-circle"/><text x="826" y="369" class="num" text-anchor="middle">4</text>
    <text x="932" y="368" class="box-title" text-anchor="middle">generate_job_description()</text>
    <text x="932" y="388" class="box-sub" text-anchor="middle">接收 JDGenerateRequest</text>
    <text x="932" y="407" class="box-path" text-anchor="middle">hr_workflows.py:164</text>
  </g>

  <g id="s5">
    <rect x="802" y="492" width="260" height="96" rx="10" fill="#ffffff" stroke="#22c55e" stroke-width="1.5"/>
    <circle cx="826" cy="515" r="13" class="step-circle"/><text x="826" y="519" class="num" text-anchor="middle">5</text>
    <text x="932" y="516" class="box-title" text-anchor="middle">DifyService</text>
    <text x="932" y="536" class="box-sub" text-anchor="middle">call_workflow_stream()</text>
    <text x="932" y="554" class="box-sub" text-anchor="middle">workflow_type = 1</text>
    <text x="932" y="573" class="box-path" text-anchor="middle">backend/app/services/dify_service.py</text>
  </g>

  <g id="s6">
    <rect x="1162" y="492" width="256" height="96" rx="10" fill="#ffffff" stroke="#f59e0b" stroke-width="1.5"/>
    <circle cx="1186" cy="515" r="13" class="step-circle"/><text x="1186" y="519" class="num" text-anchor="middle">6</text>
    <text x="1290" y="516" class="box-title" text-anchor="middle">Dify JD 工作流</text>
    <text x="1290" y="536" class="box-sub" text-anchor="middle">根据岗位需求生成 JD 文本</text>
    <text x="1290" y="554" class="box-sub" text-anchor="middle">流式输出文本 chunk</text>
  </g>

  <g id="s7">
    <rect x="82" y="640" width="260" height="96" rx="10" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5"/>
    <circle cx="106" cy="663" r="13" class="step-circle"/><text x="106" y="667" class="num" text-anchor="middle">7</text>
    <text x="212" y="664" class="box-title" text-anchor="middle">handleStreamResponse()</text>
    <text x="212" y="684" class="box-sub" text-anchor="middle">接收 StreamingResponse</text>
    <text x="212" y="702" class="box-sub" text-anchor="middle">累加 streamContent</text>
    <text x="212" y="721" class="box-path" text-anchor="middle">JDGenerator.vue</text>
  </g>

  <g id="s8">
    <rect x="82" y="790" width="260" height="88" rx="10" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5"/>
    <circle cx="106" cy="813" r="13" class="step-circle"/><text x="106" y="817" class="num" text-anchor="middle">8</text>
    <text x="212" y="816" class="box-title" text-anchor="middle">生成内容进入编辑态</text>
    <text x="212" y="836" class="box-sub" text-anchor="middle">generatedJD / editContent</text>
    <text x="212" y="855" class="box-path" text-anchor="middle">JDGenerator.vue:1035</text>
  </g>

  <g id="s9">
    <rect x="82" y="930" width="260" height="96" rx="10" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5"/>
    <circle cx="106" cy="953" r="13" class="step-circle"/><text x="106" y="957" class="num" text-anchor="middle">9</text>
    <text x="212" y="954" class="box-title" text-anchor="middle">saveJD()</text>
    <text x="212" y="974" class="box-sub" text-anchor="middle">组装 jdData</text>
    <text x="212" y="992" class="box-sub" text-anchor="middle">content = editContent.value</text>
    <text x="212" y="1011" class="box-path" text-anchor="middle">JDGenerator.vue:1049</text>
  </g>

  <g id="d1" transform="translate(572 978)">
    <polygon points="0,-56 78,0 0,56 -78,0" fill="#ffffff" stroke="#f59e0b" stroke-width="1.8"/>
    <text y="-5" class="box-title" text-anchor="middle">已有</text>
    <text y="15" class="box-title" text-anchor="middle">savedJDId?</text>
  </g>

  <g id="s10">
    <rect x="802" y="930" width="260" height="96" rx="10" fill="#ffffff" stroke="#22c55e" stroke-width="1.5"/>
    <circle cx="826" cy="953" r="13" class="step-circle"/><text x="826" y="957" class="num" text-anchor="middle">10</text>
    <text x="932" y="954" class="box-title" text-anchor="middle">save_job_description()</text>
    <text x="932" y="974" class="box-sub" text-anchor="middle">POST /api/v1/job-descriptions/save</text>
    <text x="932" y="992" class="box-sub" text-anchor="middle">Depends 获取用户和 DB</text>
    <text x="932" y="1011" class="box-path" text-anchor="middle">job_description.py:27</text>
  </g>

  <g id="s11">
    <rect x="802" y="1080" width="260" height="96" rx="10" fill="#ffffff" stroke="#22c55e" stroke-width="1.5"/>
    <circle cx="826" cy="1103" r="13" class="step-circle"/><text x="826" y="1107" class="num" text-anchor="middle">11</text>
    <text x="932" y="1104" class="box-title" text-anchor="middle">create_job_description()</text>
    <text x="932" y="1124" class="box-sub" text-anchor="middle">model_dump 后调用远程保存</text>
    <text x="932" y="1142" class="box-sub" text-anchor="middle">remote_service_client.post()</text>
    <text x="932" y="1161" class="box-path" text-anchor="middle">job_description_service.py:30</text>
  </g>

  <g id="s12">
    <rect x="1162" y="1080" width="256" height="96" rx="10" fill="#ffffff" stroke="#f59e0b" stroke-width="1.5"/>
    <circle cx="1186" cy="1103" r="13" class="step-circle"/><text x="1186" y="1107" class="num" text-anchor="middle">12</text>
    <text x="1290" y="1104" class="box-title" text-anchor="middle">远程 HR 服务保存</text>
    <text x="1290" y="1124" class="box-sub" text-anchor="middle">/job-descriptions/save</text>
    <text x="1290" y="1142" class="box-sub" text-anchor="middle">返回保存后的 JD 数据 / ID</text>
    <text x="1290" y="1161" class="box-path" text-anchor="middle">HR_SERVICE_HOST:HR_SERVICE_PORT</text>
  </g>

  <g id="s13">
    <rect x="82" y="1080" width="260" height="96" rx="10" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5"/>
    <circle cx="106" cy="1103" r="13" class="step-circle"/><text x="106" y="1107" class="num" text-anchor="middle">13</text>
    <text x="212" y="1104" class="box-title" text-anchor="middle">前端接收保存结果</text>
    <text x="212" y="1124" class="box-sub" text-anchor="middle">savedJDId = response.id</text>
    <text x="212" y="1142" class="box-sub" text-anchor="middle">提示“JD保存成功”</text>
    <text x="212" y="1161" class="box-path" text-anchor="middle">JDGenerator.vue</text>
  </g>

  <g id="u1">
    <rect x="442" y="1080" width="260" height="96" rx="10" fill="#ffffff" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="572" y="1108" class="box-title" text-anchor="middle">更新分支</text>
    <text x="572" y="1128" class="box-sub" text-anchor="middle">jobDescriptionApi.updateJD()</text>
    <text x="572" y="1146" class="box-sub" text-anchor="middle">PUT /job-descriptions/{id}</text>
    <text x="572" y="1165" class="box-path" text-anchor="middle">已有 savedJDId 时触发</text>
  </g>

  <!-- Main generation arrows -->
  <path d="M 212 288 L 212 342" class="flow"/>
  <text x="224" y="321" class="arrow-label">点击生成</text>
  <path d="M 342 386 L 442 386" class="flow"/>
  <text x="392" y="374" class="arrow-label" text-anchor="middle">调用封装</text>
  <path d="M 702 386 L 802 386" class="flow"/>
  <text x="752" y="374" class="arrow-label" text-anchor="middle">HTTP POST</text>
  <path d="M 932 430 L 932 492" class="flow"/>
  <text x="944" y="466" class="arrow-label">构造 query</text>
  <path d="M 1062 540 L 1162 540" class="flow"/>
  <text x="1112" y="528" class="arrow-label" text-anchor="middle">调用工作流</text>

  <!-- Stream return arrows -->
  <path d="M 1290 588 C 1290 650, 932 628, 932 636 C 932 690, 382 688, 342 688" class="return-flow"/>
  <text x="791" y="656" class="arrow-label" text-anchor="middle">StreamingResponse / chunk</text>
  <path d="M 212 736 L 212 790" class="flow"/>
  <text x="224" y="770" class="arrow-label">累加完成</text>
  <path d="M 212 878 L 212 930" class="save-flow"/>
  <text x="224" y="910" class="arrow-label">自动保存</text>

  <!-- Save branch arrows -->
  <path d="M 342 978 L 494 978" class="save-flow"/>
  <text x="418" y="964" class="arrow-label" text-anchor="middle">检查状态</text>
  <path d="M 650 978 L 802 978" class="save-flow"/>
  <text x="724" y="964" class="arrow-label" text-anchor="middle">否：新增保存</text>
  <path d="M 572 1034 L 572 1080" class="branch-flow"/>
  <text x="585" y="1063" class="arrow-label">是：更新</text>

  <!-- Persistence arrows -->
  <path d="M 932 1026 L 932 1080" class="save-flow"/>
  <text x="944" y="1058" class="arrow-label">进入服务层</text>
  <path d="M 1062 1128 L 1162 1128" class="save-flow"/>
  <text x="1112" y="1116" class="arrow-label" text-anchor="middle">远程 POST</text>
  <path d="M 1290 1080 C 1290 1016, 1118 1008, 1062 1000" class="return-flow"/>
  <text x="1218" y="1018" class="arrow-label" text-anchor="middle">返回 result_data</text>
  <path d="M 802 1128 C 702 1128, 702 1128, 342 1128" class="return-flow"/>
  <text x="572" y="1116" class="arrow-label" text-anchor="middle">JobDescriptionResponse / id</text>
  <path d="M 442 1128 L 342 1128" class="return-flow"/>

  <!-- Notes -->
  <rect x="52" y="1198" width="1396" height="52" rx="12" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.3"/>
  <text x="76" y="1222" class="note-title">关键理解</text>
  <text x="170" y="1222" class="note-text">1. /hr-workflows/generate-jd 只负责通过 Dify 生成 JD 文本；2. /job-descriptions/save 负责保存 JD 数据；3. 前端 JDGenerator.vue 把两个阶段串联起来。</text>
  <text x="170" y="1242" class="note-text">远程保存实际由 JobDescriptionService.create_job_description() 调 remote_service_client.post(endpoint="/job-descriptions/save") 完成。</text>
</svg>
